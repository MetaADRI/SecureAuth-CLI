<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureAuth</title>
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cuz-blue': '#003366',
                        'cuz-blue-light': '#0066CC',
                        'cuz-blue-dark': '#002244',
                        'metallic': '#6C757D',
                        'light-gray': '#F8F9FA',
                        'dark-gray': '#343A40',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .input-focus:focus {
            border-color: #003366;
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }
        
        .btn-scale {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn-scale:hover {
            transform: scale(1.02);
        }
        
        .btn-scale:active {
            transform: scale(0.98);
        }
        
        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s ease;
        }
        
        /* Progress bar for lockout warning */
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Logo Header - Logo on top, text below -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex flex-col items-center">
                <!-- Logo Icon -->
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-3 shadow-lg" style="background: linear-gradient(135deg, #003366 0%, #0066CC 100%);">
                    <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <!-- SecureAuth Text Below -->
                <span class="text-2xl font-bold text-cuz-blue">SecureAuth</span>
            </a>
            <h1 class="text-2xl font-bold text-dark-gray mt-4">Welcome Back</h1>
            <p class="text-metallic mt-2">Log in to access your secure dashboard</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <!-- Login Form -->
            <form id="loginForm" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-dark-gray mb-2">
                        Email Address
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-metallic" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </div>
                        <input 
                            type="email" 
                            id="email" 
                            required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl input-focus outline-none transition-all"
                            placeholder="name@company.com"
                        >
                    </div>
                </div>
                
                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-dark-gray mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-metallic" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            required
                            class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-xl input-focus outline-none transition-all"
                            placeholder="Enter your password"
                        >
                        <button 
                            type="button" 
                            id="togglePassword"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-metallic hover:text-cuz-blue transition-colors"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="eyeIcon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Error Alert -->
                <div id="errorAlert" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
                    <div class="flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span id="errorMessage"></span>
                    </div>
                </div>
                
                <!-- Lockout Warning (Hidden by default) -->
                <div id="lockoutWarning" class="hidden bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-xl text-sm">
                    <div class="flex items-center mb-2">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <span class="font-semibold">Account Lockout Warning</span>
                    </div>
                    <p id="attemptsText" class="mb-2 text-yellow-700"></p>
                    <div class="w-full bg-yellow-200 rounded-full h-2">
                        <div id="attemptsBar" class="bg-yellow-500 h-2 rounded-full progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full bg-cuz-blue hover:bg-cuz-blue-light text-white py-3.5 rounded-xl font-semibold btn-scale transition-colors flex items-center justify-center"
                >
                    <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">Continue to 2FA</span>
                </button>
            </form>
            
            <!-- 2FA Success State (Hidden initially) -->
            <div id="successSection" class="hidden text-center py-4">
                <div class="w-16 h-16 bg-cuz-blue/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-cuz-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-dark-gray mb-2">Password Verified</h3>
                <p class="text-metallic mb-4">Redirecting to 2FA verification...</p>
                <div class="flex justify-center">
                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-cuz-blue"></div>
                </div>
            </div>
        </div>
        
        <!-- Links -->
        <div class="text-center mt-6 space-y-3">
            <p class="text-metallic">
                Don't have an account? 
                <a href="register.html" class="text-cuz-blue hover:text-cuz-blue-light font-semibold transition-colors">Register</a>
            </p>
            <a href="index.html" class="inline-flex items-center text-metallic hover:text-cuz-blue transition-colors text-sm">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
        
        <!-- Security Badge -->
        <div class="flex items-center justify-center mt-8 text-metallic text-sm">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <span>Protected by 256-bit encryption</span>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Update icon
            if (type === 'password') {
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            } else {
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            }
        });
        
        // Login attempts tracking for UI
        let loginAttempts = 0;
        const MAX_ATTEMPTS = 5;
        
        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const lockoutWarning = document.getElementById('lockoutWarning');
            const attemptsText = document.getElementById('attemptsText');
            const attemptsBar = document.getElementById('attemptsBar');
            const loginBtn = document.getElementById('loginBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');
            
            // Hide error, show loading
            errorAlert.classList.add('hidden');
            loginBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            btnText.textContent = 'Verifying...';
            
            try {
                const response = await fetch(`${SecureAuth.API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store temp token and email for 2FA step
                    localStorage.setItem('tempToken', data.tempToken);
                    localStorage.setItem('userEmail', email);
                    
                    // Show success state
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('successSection').classList.remove('hidden');
                    
                    // Redirect to 2FA verification
                    setTimeout(() => {
                        window.location.href = 'verify.html';
                    }, 1500);
                } else {
                    loginAttempts++;
                    
                    // Show lockout warning if approaching limit
                    if (loginAttempts >= 2 && loginAttempts < MAX_ATTEMPTS) {
                        lockoutWarning.classList.remove('hidden');
                        const remaining = MAX_ATTEMPTS - loginAttempts;
                        attemptsText.textContent = `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining before lockout`;
                        attemptsBar.style.width = `${(loginAttempts / MAX_ATTEMPTS) * 100}%`;
                    } else if (loginAttempts >= MAX_ATTEMPTS) {
                        lockoutWarning.classList.remove('hidden');
                        attemptsText.textContent = 'Account will be locked. Please wait 15 minutes.';
                        attemptsBar.style.width = '100%';
                        attemptsBar.classList.remove('bg-yellow-500');
                        attemptsBar.classList.add('bg-red-500');
                    }
                    
                    errorMessage.textContent = data.message || 'Invalid credentials';
                    errorAlert.classList.remove('hidden');
                    errorAlert.classList.add('shake');
                    setTimeout(() => errorAlert.classList.remove('shake'), 500);
                    loginBtn.disabled = false;
                    loadingSpinner.classList.add('hidden');
                    btnText.textContent = 'Continue to 2FA';
                }
            } catch (error) {
                errorMessage.textContent = 'Connection error. Is the server running?';
                errorAlert.classList.remove('hidden');
                errorAlert.classList.add('shake');
                setTimeout(() => errorAlert.classList.remove('shake'), 500);
                loginBtn.disabled = false;
                loadingSpinner.classList.add('hidden');
                btnText.textContent = 'Continue to 2FA';
            }
        });
    </script>
</body>
</html>
